<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #transactionModal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
        .modalContent {
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #ffffff;
            border-radius: 20px;
            width: 300px;
        }
        .success {
            color: white;
            background-color: #02aef2;
        }
        .error {
            color: white;
            background-color: #ff4949;
        }
    </style>
    <script src="./js/gaurd.js"></script>
</head>
<body>
    <div>
        <h1>Send Money</h1>
        <a href="dashboard.html">dashboard</a><br><br>
        <div id="sendMoneyForm">
            <label for="receiverEmail">Receiver Email:</label><br>
            <input type="email" id="receiverEmail" required>
            <br>
            <label for="amount">Amount:</label><br>
            <input type="text" id="amount" required>
            <br>
            <label for="note">Note:</label><br>
            <input type="text" id="note">
            <br><br>
            <button id="sendBtn">Send Money</button>
        </div>
    </div>


    <div id="transactionModal">
        <div class="modalContent" id="modalContent">
            <h3>Transaction Details</h3>

            <div id="modalDetails"></div>
            <br>

            <button id="closeModalBtn">Close</button>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/pages/sendMoney.js"></script>
</body>
</html>
