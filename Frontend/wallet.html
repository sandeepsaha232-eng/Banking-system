<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - GBI Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/guard.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="bi bi-bank2"></i> GBI Bank
        </div>
        <div class="navbar-nav">
            <div class="navbar-user">
                <i class="bi bi-person-circle"></i> <span id="userEmailNav"></span>
            </div>
            <a href="dashboard.html" class="btn-secondary"
                style="padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none;"><i class="bi bi-grid"></i>
                Dashboard</a>
        </div>
    </nav>

    <div class="app-container">
        <div class="mb-4 flex-between">
            <div>
                <h2 style="font-weight: 800; letter-spacing: -0.02em;">Your Wallet</h2>
                <p>Manage your funds and view history</p>
            </div>
            <a href="dashboard.html" style="font-weight: 600;"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div class="dashboard-grid">
            <!-- Left Column: Balance & Add Funds -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="balance-card">
                    <h3>Wallet Balance</h3>
                    <h1 id="currentBalance">***.**</h1>
                </div>

                <div class="card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem;"><i class="bi bi-plus-circle"></i> Add Funds
                    </h3>
                    <div class="form-group">
                        <label for="amount">Enter Amount (GC)</label>
                        <input type="number" id="amount" placeholder="e.g. 500" />
                    </div>
                    <button id="addFundsBtn" class="btn-primary mt-2"><i class="bi bi-plus-circle"></i> Add Funds to
                        Wallet</button>
                </div>
            </div>

            <!-- Right Column: Transactions -->
            <div class="card" style="padding: 2rem;">
                <h3 class="mb-3"><i class="bi bi-clock-history"></i> Transaction History</h3>
                <div id="transactionHistory" class="transaction-list">
                    <!-- Transactions populated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="transactionModal">
        <div class="modalContent" id="modalContent">
            <h3 class="mb-3">Transaction Details</h3>
            <div id="modalDetails" style="text-align: left; background: #f8fafc; padding: 1.5rem; border-radius: 8px;">
            </div>
            <button id="closeModalBtn" class="btn-secondary mt-3" style="width: 100%;"><i class="bi bi-x-circle"></i>
                Close</button>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/pages/wallet-page.js"></script>
</body>

</html>
