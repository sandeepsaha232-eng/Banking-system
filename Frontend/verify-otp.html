<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
</head>
<body>
    <h1>Verify Your Account</h1>
    <p>Please enter the otp sent to your registered email</p>
    <p>Otp is valid for only 10 minutes</p>

    <div id="otpForm">
        <label for="otp">Enter the Otp Correctly</label><br>
        <input type="text" id="otpField" placeholder="OTP">
        <br>
        <p id="errorMsg" style="color: red; display: none;"></p>
        <br>
        <button id="submitOtp">Verify</button>
    </div>
    <br>
    <p>The otp sent to your email is valid only for 10 minutes after that you will have to restart the process again</p>
    
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/verifyOtp.js"></script>
</body>
</html>
