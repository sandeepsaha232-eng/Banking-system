<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - GBI Bank</title>
    <script>
        (function () {
            if (!sessionStorage.getItem('otpEmail')) {
                window.location.href = './login.html';
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="auth-container">
        <div id="otpForm" class="card auth-card">
            <h1 style="color: var(--primary-color);"><i class="bi bi-shield-check"></i> Verify Account</h1>
            <p class="subtitle" style="margin-bottom: 1rem;">Please enter the OTP sent to your registered email.</p>
            <div
                style="background-color: #f8fafc; padding: 1rem; border-radius: 8px; font-size: 0.85rem; color: var(--text-gray); margin-bottom: 2rem;">
                <i class="bi bi-info-circle"></i> OTP is valid for 10 minutes. If it expires, you will need to restart
                the process.
            </div>

            <div class="form-group mb-3">
                <label for="otpField"><i class="bi bi-key"></i> Enter OTP</label>
                <input type="text" id="otpField" placeholder="6-digit OTP code">
            </div>

            <p id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></p>

            <button id="submitOtp" class="btn-primary mb-3"><i class="bi bi-check-circle"></i> Verify My
                Account</button>
            <div class="mt-3">
                <a href="login.html" style="font-size: 0.85rem; color: var(--text-light);"><i
                        class="bi bi-arrow-left"></i> Return to Login</a>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/pages/verifyOtp.js"></script>
</body>

</html>
